<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Page</title>

  <!-- Font Agrandir -->
  <link href="https://fonts.cdnfonts.com/css/agrandir" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Agrandir', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background-color:#162E93;

      /* DOT PATTERN */
      background-image: radial-gradient(
        rgba(230,220,200,0.35) 1.5px,
        transparent 1.5px
      );

      background-size:24px 24px;

      color:#e6dcc8;
      overflow:hidden;
    }

    .login-box{
      width:320px;
      padding:32px;
      border-radius:24px;
      background:#e6dcc8;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      text-align:center;
      position:relative;
      z-index:2;
    }

    h1{
      margin-bottom:10px;
      font-size:26px;
      font-weight:700;
      color:#162E93;
      letter-spacing:-0.5px;
    }

    .clue{
      margin-bottom:22px;
      font-size:13px;
      color:#4b5fae;
    }

    input{
      width:100%;
      padding:13px;
      border:2px solid #162E93;
      outline:none;
      border-radius:14px;
      background:#e6dcc8;
      color:#162E93;
      margin-bottom:16px;
      font-size:15px;
      transition:0.2s;
    }

    input:focus{
      transform:scale(1.01);
    }

    input::placeholder{
      color:#4b5fae;
    }

    button{
      width:100%;
      padding:13px;
      border:none;
      border-radius:14px;
      background:#162E93;
      color:#e6dcc8;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.02);
      opacity:0.95;
    }

    .error{
      margin-top:12px;
      color:#b23b3b;
      font-size:14px;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1>Isi ini dulu nesh</h1>

    <p class="clue">*Clue: Lu kalo jadi makanan menurut gua (no spasi, lowercase)</p>

    <input type="password" id="password" placeholder="Password">

    <button onclick="checkPassword()">Enter</button>

    <p class="error" id="error"></p>
  </div>

  <script>
    function checkPassword() {

      const correctPassword = "ayamgeprek";
      const input = document.getElementById("password").value;

      if(input === correctPassword){
        window.location.href = "https://mattmouze.github.io/About-Ganesha/";
      } else {
        document.getElementById("error").innerText = "Password salah.";
      }

    }
  </script>

</body>
</html>
